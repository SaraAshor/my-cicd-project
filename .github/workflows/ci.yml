name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Install Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install requirements
        run: pip install -r app/requirements.txt

      - name: Run tests
        run: pytest tests/

      - name: Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
